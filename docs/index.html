<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 화면 코드(껍데기) 캐시 무효화 — 새로고침 없이 항상 최신 화면 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Tech Trends — 오늘의 AI·개발 트렌드</title>
  <!-- styles/app은 캐시버스팅 쿼리로 매번 새로 받는다 -->
  <script>
    (function () {
      var v = Date.now();
      document.write('<link rel="stylesheet" href="styles.css?v=' + v + '">');
      window.__ASSET_V = v;
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <h1>Tech Trends</h1>
    <div class="meta" id="meta">
      <span id="freshness">불러오는 중…</span>
      <span id="meta-extra"></span>
    </div>
    <div class="datenav" id="datenav"></div>
  </header>

  <nav class="tabs" id="tabs" role="tablist"><!-- 탭은 app.js가 채운다 --></nav>

  <main id="panels" aria-live="polite">
    <p class="placeholder" id="placeholder">데이터를 불러오는 중…</p>
  </main>

  <footer class="site-footer">
    <span>무료 공개 RSS·API 수집 · 출처 링크 포함 · 매일 KST 08:00경 갱신</span>
  </footer>

  <script>
    // app.js를 캐시버스팅 쿼리로 동적 로드 — 항상 최신 화면 코드
    (function () {
      var s = document.createElement('script');
      s.src = 'app.js?v=' + (window.__ASSET_V || Date.now());
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
