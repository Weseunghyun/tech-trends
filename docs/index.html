<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: 동일 출처만 — 외부 리소스·인라인 스크립트·임의 스킴 이중 차단(수집 데이터는 방어적으로 취급) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'">
  <meta name="theme-color" content="#0f1419">
  <title>Tech Trends — 오늘의 AI·개발 트렌드</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <!-- 화면 코드는 정적 로드(GitHub Pages max-age=600, 최대 10분 지연 수용) —
       매일 바뀌는 건 데이터고, 데이터 fetch는 app.js가 신선도를 직접 관리한다 -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Tech Trends</h1>
    <div class="meta" id="meta">
      <span id="freshness" role="status">불러오는 중…</span>
      <span id="meta-extra"></span>
    </div>
    <div class="datenav" id="datenav"></div>
  </header>

  <div class="tabs" id="tabs" role="tablist" aria-label="카테고리"><!-- 탭은 app.js가 채운다 --></div>

  <main>
    <div id="panels" role="tabpanel" tabindex="0" aria-label="트렌드 목록">
      <p class="placeholder" id="placeholder">데이터를 불러오는 중…</p>
    </div>
  </main>

  <footer class="site-footer">
    <span>무료 공개 RSS·API 수집 · 출처 링크 포함 · 매일 KST 08:00경 갱신</span>
  </footer>

  <noscript><p class="placeholder">이 대시보드는 JavaScript가 필요합니다.</p></noscript>
  <script src="app.js" defer></script>
</body>
</html>
