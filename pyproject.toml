[tool.ruff]
target-version = "py311"
line-length = 100
src = ["scripts", "tests"]

[tool.ruff.lint]
# E/F 기본 + 보안(S, bandit 계열) + 버그류(B) + 단순화(SIM) + import 정렬(I)
select = ["E", "F", "I", "B", "SIM", "S"]

[tool.ruff.lint.per-file-ignores]
# 테스트는 assert(S101) 허용
"tests/**" = ["S101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
